<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Tableau de Location</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at top, rgba(45, 106, 79, 0.12), transparent 55%),
        var(--canvas);
    }
    .login-card {
      width: min(420px, 100%);
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 32px 28px 28px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .login-brand img { height: 42px; width: auto; }
    .login-brand h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--brand-dark);
    }
    .login-brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }
    .login-form label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .login-form input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      font: inherit;
      margin-bottom: 14px;
    }
    .login-form input:focus {
      outline: 2px solid rgba(45, 106, 79, 0.25);
      border-color: var(--brand-green);
    }
    .login-error {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: #fef2f2;
      color: #b91c1c;
      font-size: 13px;
      border: 1px solid #fecaca;
    }
    .login-error.visible { display: block; }
    .login-submit {
      width: 100%;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <img src="assets/logo-full.png" alt="Boulet Dépôt" />
        <div>
          <h1>Tableau de Location</h1>
          <p>Accès réservé à l'équipe</p>
        </div>
      </div>
      <form class="login-form" id="loginForm">
        <div class="login-error" id="loginError"></div>
        <label for="user">Nom d'utilisateur</label>
        <input id="user" name="user" type="text" autocomplete="username" required />
        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="submit" class="btn btn-primary login-submit">Se connecter</button>
      </form>
    </div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('visible');
      const user = form.user.value.trim();
      const password = form.password.value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = body.error || 'Identifiants incorrects.';
          errEl.classList.add('visible');
          return;
        }
        window.location.href = '/';
      } catch {
        errEl.textContent = 'Impossible de joindre le serveur.';
        errEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
