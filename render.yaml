services:
  - type: web
    name: tableau-location
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/data.db
      - key: PORT
        value: "5000"
    disk:
      name: tableau-data
      mountPath: /data
      sizeGB: 1
